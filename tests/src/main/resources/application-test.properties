# --- Test profile overrides ----------------------------------------------------
# Re-use the same H2 in-memory datasource; schema.sql seeds data on every
# context start so each test run gets a clean, predictable dataset.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

# Suppress Spring/Jersey startup noise in test output
logging.level.root=WARN
logging.level.com.ai.tester=INFO

