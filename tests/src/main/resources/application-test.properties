base.url=${BASE_URL:http://localhost}

http.client.base-url=${HTTP_CLIENT_BASE_URL:http://localhost}
http.client.port=${HTTP_CLIENT_PORT:${local.server.port:8080}}
http.client.base-path=${HTTP_CLIENT_BASE_PATH:/app}
http.client.username=${HTTP_CLIENT_USERNAME:test}
http.client.password=${HTTP_CLIENT_PASSWORD:test}
http.client.wrong-username=${HTTP_CLIENT_WRONG_USERNAME:invalid_user}
http.client.wrong-password=${HTTP_CLIENT_WRONG_PASSWORD:invalid_password}

# --- Test profile overrides ----------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

app.security.username=test
app.security.password=test

# Suppress Spring/Jersey startup noise in test output
logging.level.root=WARN
logging.level.com.ai.tester=DEBUG

