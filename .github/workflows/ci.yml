name: CI Pipeline

on:
  push:
    branches:
      - '**'
      - '!master'
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Validate with Checkstyle
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Run Component Tests
        run: mvn test --no-transfer-progress
        working-directory: tests

      - name: Upload Allure Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/target/allure-results/
          retention-days: 30

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tests/target/surefire-reports/
          retention-days: 30

      - name: Upload Checkstyle Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            app/target/checkstyle-result.xml
            tests/target/checkstyle-result.xml
          retention-days: 30

      - name: Load Allure Report History
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -zxf allure.tgz
          cp -r gh-pages/history tests/target/allure-results/history 2>/dev/null || true
          allure-2.32.0/bin/allure generate tests/target/allure-results -o allure-report --clean

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          enable_jekyll: false

