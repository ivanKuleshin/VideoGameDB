name: CI Pipeline

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Validate with Checkstyle
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Run Component Tests
        run: mvn test --no-transfer-progress
        working-directory: tests

      - name: Upload Allure Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/target/allure-results/
          retention-days: 30

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tests/target/surefire-reports/
          retention-days: 30

      - name: Upload Checkstyle Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            app/target/checkstyle-result.xml
            tests/target/checkstyle-result.xml
          retention-days: 30

      - name: Load Allure Report History
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
          tar -zxf allure.tgz
          cp -r gh-pages/history tests/target/allure-results/history 2>/dev/null || true
          allure-2.32.0/bin/allure generate tests/target/allure-results -o allure-report --clean

      - name: Deploy Allure Report to GitHub Pages (push to master)
        if: always() && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: allure-report
          clean: false

      - name: Deploy Allure Report to GitHub Pages (pull request)
        if: always() && github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: allure-report
          target-folder: pr-${{ github.event.number }}
          clean: false

      - name: Add Allure Report link to job summary (push to master)
        if: always() && github.event_name == 'push'
        run: |
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Open Allure Report](https://ivankuleshin.github.io/VideoGameDB/)" >> $GITHUB_STEP_SUMMARY

      - name: Add Allure Report link to job summary (pull request)
        if: always() && github.event_name == 'pull_request'
        run: |
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Open Allure Report](https://ivankuleshin.github.io/VideoGameDB/pr-${{ github.event.number }}/)" >> $GITHUB_STEP_SUMMARY

      - name: Post Allure Report link to PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const reportUrl = `https://ivankuleshin.github.io/VideoGameDB/pr-${prNumber}/`;
            const body = `## 📊 Allure Report\n🔗 [Open Allure Report](${reportUrl})`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body.includes('Allure Report') && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

