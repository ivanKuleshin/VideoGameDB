name: CI Pipeline

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Validate with Checkstyle
        run: mvn clean install -DskipTests --no-transfer-progress

      - name: Run Component Tests
        run: mvn test --no-transfer-progress
        working-directory: tests

      - name: Upload Allure Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/target/allure-results/
          retention-days: 30

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tests/target/surefire-reports/
          retention-days: 30

      - name: Upload Checkstyle Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            app/target/checkstyle-result.xml
            tests/target/checkstyle-result.xml
          retention-days: 30

