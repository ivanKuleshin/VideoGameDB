logging.level.org.springframework=INFO
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.h2.console.enabled=true

# Jersey - all JAX-RS endpoints are mounted under /app
# Run as filter so Jersey handles /app/** before Spring MVC intercepts
spring.jersey.type=filter
spring.jersey.application-path=/app
# Forward unmatched requests to Spring MVC (for /swagger-ui.html, /webjars/**, /h2-console)
spring.jersey.init.jersey.config.servlet.filter.forwardOn404=true
# Swagger UI:   http://localhost:8080/swagger-ui.html
# OpenAPI spec: http://localhost:8080/app/openapi.json
